description:
  human:
    en_US: Read a text file from a Declaw sandbox.
  llm: Read a text file from a sandbox. Returns the file content.
extra:
  python:
    source: tools/read_file.py
identity:
  author: declaw
  label:
    en_US: Read File
  name: read_file
parameters:
  - name: sandbox_id
    type: string
    required: true
    form: llm
    label:
      en_US: Sandbox ID
    llm_description: Sandbox ID returned by create_sandbox.
  - name: path
    type: string
    required: true
    form: llm
    label:
      en_US: File Path
    llm_description: Absolute file path to read (e.g. /tmp/output.txt).
