description:
  human:
    en_US: Write text content to a file in a Declaw sandbox.
  llm: Write text content to a file in a sandbox. Creates parent directories automatically.
extra:
  python:
    source: tools/write_file.py
identity:
  author: declaw
  label:
    en_US: Write File
  name: write_file
parameters:
  - name: sandbox_id
    type: string
    required: true
    form: llm
    label:
      en_US: Sandbox ID
    human_description:
      en_US: Sandbox ID returned by create_sandbox.
    llm_description: Sandbox ID returned by create_sandbox.
  - name: path
    type: string
    required: true
    form: llm
    label:
      en_US: File Path
    human_description:
      en_US: Absolute file path to write (e.g. /tmp/script.py).
    llm_description: Absolute file path to write (e.g. /tmp/script.py).
  - name: content
    type: string
    required: true
    form: llm
    label:
      en_US: Content
    human_description:
      en_US: Text content to write to the file.
    llm_description: Text content to write to the file.
