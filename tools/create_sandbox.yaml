identity:
  name: create_sandbox
  author: declaw
  label:
    en_US: Create Sandbox

description:
  human:
    en_US: Create a new secure sandbox environment with configurable security policies.
  llm: >-
    Create a new isolated Firecracker microVM sandbox. Returns a sandbox_id
    to use with other Declaw tools (run_command, read_file, write_file, etc.).
    Choose a security preset to control PII scanning, injection defense, and
    network policies.

parameters:
  - name: template
    type: select
    required: false
    default: base
    label:
      en_US: Template
    human_description:
      en_US: Sandbox template with pre-installed software.
    llm_description: >-
      Sandbox template. Use "base" for shell only, "python" for Python,
      "node" for Node.js, "code-interpreter" for Jupyter-style execution.
    form: llm
    options:
      - value: base
        label:
          en_US: Base (shell)
      - value: python
        label:
          en_US: Python
      - value: node
        label:
          en_US: Node.js
      - value: code-interpreter
        label:
          en_US: Code Interpreter
      - value: ai-agent
        label:
          en_US: AI Agent
      - value: mcp-server
        label:
          en_US: MCP Server
      - value: web-dev
        label:
          en_US: Web Development
      - value: devops
        label:
          en_US: DevOps

  - name: timeout
    type: number
    required: false
    default: 300
    label:
      en_US: Timeout (seconds)
    human_description:
      en_US: Sandbox timeout in seconds (10–86400).
    llm_description: Sandbox timeout in seconds. Default 300 (5 minutes).
    form: llm
    min: 10
    max: 86400

  - name: security_preset
    type: select
    required: false
    default: standard
    label:
      en_US: Security Preset
    human_description:
      en_US: Security guardrails level.
    llm_description: >-
      Security preset. "none": no guardrails. "standard": PII scanning + audit.
      "strict": PII + injection defense + audit + network deny-all.
    form: llm
    options:
      - value: none
        label:
          en_US: None
      - value: standard
        label:
          en_US: Standard (PII + Audit)
      - value: strict
        label:
          en_US: Strict (PII + Injection + Audit + Network deny-all)

  - name: allowed_domains
    type: string
    required: false
    label:
      en_US: Allowed Domains
    human_description:
      en_US: Comma-separated domain allowlist for outbound network access.
    llm_description: >-
      Comma-separated list of domains allowed for outbound network access
      (e.g. "pypi.org,github.com"). Overrides network deny-all.
    form: llm

extra:
  python:
    source: tools/create_sandbox.py
