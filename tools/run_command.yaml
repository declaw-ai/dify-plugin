description:
  human:
    en_US: Execute a shell command inside a Declaw sandbox.
  llm: >-
    Execute a shell command inside a sandbox. Returns stdout, stderr, and
    exit code. Requires a sandbox_id from create_sandbox.
extra:
  python:
    source: tools/run_command.py
identity:
  author: declaw
  label:
    en_US: Run Command
  name: run_command
parameters:
  - name: sandbox_id
    type: string
    required: true
    form: llm
    label:
      en_US: Sandbox ID
    human_description:
      en_US: Sandbox ID returned by create_sandbox.
    llm_description: Sandbox ID returned by create_sandbox.
  - name: command
    type: string
    required: true
    form: llm
    label:
      en_US: Command
    human_description:
      en_US: Shell command to execute.
    llm_description: Shell command to execute.
  - name: timeout
    type: number
    required: false
    default: 30
    form: llm
    label:
      en_US: Timeout (seconds)
    human_description:
      en_US: Command timeout in seconds. Default 30.
    llm_description: Command timeout in seconds. Default 30.
    min: 1
    max: 3600
