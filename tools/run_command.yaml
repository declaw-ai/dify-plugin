identity:
  name: run_command
  author: declaw
  label:
    en_US: Run Command

description:
  human:
    en_US: Execute a shell command inside a Declaw sandbox.
  llm: >-
    Execute a shell command inside a sandbox. Returns stdout, stderr, and
    exit code. Requires a sandbox_id from create_sandbox.

parameters:
  - name: sandbox_id
    type: string
    required: true
    label:
      en_US: Sandbox ID
    llm_description: Sandbox ID returned by create_sandbox.
    form: llm

  - name: command
    type: string
    required: true
    label:
      en_US: Command
    llm_description: Shell command to execute.
    form: llm

  - name: timeout
    type: number
    required: false
    default: 30
    label:
      en_US: Timeout (seconds)
    llm_description: Command timeout in seconds. Default 30.
    form: llm
    min: 1
    max: 3600

extra:
  python:
    source: tools/run_command.py
